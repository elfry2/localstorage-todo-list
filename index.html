<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Elfry's Own To-Do List</title>
        <!-- A link to the stylesheet -->
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main class="app-container">
            <h1>Elfry's Own To-Do List</h1>
            <form id="todo-form" class="input-group">
                <input type="text" id="todo-input" placeholder="New to-do" required="true" autofocus="true">
                <button type="submit" id="add-btn">Add</button>
            </form>
            <ul id="todo-list" class="todo-list"></ul>
        </main>
        <!-- A link to the script -->
        <script src="script.js"></script>
    </body>
</html>
